version: 2
updates:
  # Maven dependencies - single PR for all updates
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 1
    groups:
      all-maven-updates:
        patterns:
          - "*"

  # GitHub Actions - single PR for all workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 1
    groups:
      all-actions-updates:
        patterns:
          - "*"
